name: Bug Report
description: Report a problem with GenieClient
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide enough detail so maintainers can reproduce the issue.

  - type: input
    id: repo
    attributes:
      label: Repository
      description: Which GenieClient repo does this affect?
      placeholder: Genie4, Maps, Plugins, etc.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, GenieClient version, .NET version, plugin names, etc.
      placeholder: Windows 11, Genie4 version, plugin list
    validations:
      required: false
